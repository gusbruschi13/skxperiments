name: Publish to PyPI

# Trusted Publishing (OIDC): no API token stored. Fires when a GitHub
# Release is published, builds the artifacts, and uploads to PyPI. The
# matching trusted publisher must be configured on PyPI (project settings
# -> Publishing): owner gusbruschi13, repo skxperiments, workflow
# publish.yml.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
